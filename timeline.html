<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline</title>
    <link rel="stylesheet" href="Realdashboard.css">
</head>

<body>

    <div class="main">
        <header class="topbar">
            <div>
                <div class="page-title">Timeline</div>
                <div class="breadcrumb">Project Activity Timeline</div>
            </div>
        </header>

        <div class="content">

            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">Project Timeline</div>
                </div>

                <div class="timeline">

                    <div class="timeline-item">
                        <div class="time">Apr 1</div>
                        <div class="event">Project Created</div>
                    </div>

                    <div class="timeline-item">
                        <div class="time">Apr 3</div>
                        <div class="event">UI Dashboard Completed</div>
                    </div>

                    <div class="timeline-item">
                        <div class="time">Apr 5</div>
                        <div class="event">Sprint Board Added</div>
                    </div>

                    <div class="timeline-item">
                        <div class="time">Apr 8</div>
                        <div class="event">Authentication Added</div>
                    </div>

                </div>

            </div>

        </div>
    </div>

</body>

</html>
