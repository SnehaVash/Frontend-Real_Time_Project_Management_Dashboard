<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<link rel="stylesheet" href="Realdashboard.css">
</head>

<body>

<div class="shell">

<aside class="sidebar">

<div class="logo">
<div class="logo-dot"></div>
Orbital
</div>

<div class="nav-label">Workspace</div>

<a href="RealDash.html" class="nav-item">Overview</a>
<a href="projects.html" class="nav-item active">Projects</a>
<a href="sprint.html" class="nav-item">Sprint Board</a>
<a href="timeline.html" class="nav-item">Timeline</a>

</aside>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Projects</div>
<div class="breadcrumb">All Active Projects</div>
</div>

</header>

<div class="content">

<div id="projectsList" class="projects-list"></div>



</div>

</div>
</div>

</div>
<script>
const projects = JSON.parse(localStorage.getItem("projects")) || [];

const container = document.getElementById("projectsList");

function renderProjects(){
container.innerHTML = "";

projects.forEach((p,index) => {

const card = document.createElement("div");
card.className = "project-card";

card.innerHTML = `
<div class="project-card-head">
<h3>${p.name}</h3>

<button class="delete-btn" onclick="deleteProject(${index})">
<svg viewBox="0 0 24 24" width="16" height="16" fill="none">
<path d="M3 6h18" stroke="currentColor" stroke-width="2"/>
<path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2"/>
<path d="M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2"/>
<path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2"/>
</svg>
</button>

</div>

<p>${p.desc}</p>
<span>${p.date}</span>
`;
container.appendChild(card);

});

}

function deleteProject(index){

projects.splice(index,1);

localStorage.setItem("projects", JSON.stringify(projects));

renderProjects();

}

renderProjects();

</script>
</body>
</html>
