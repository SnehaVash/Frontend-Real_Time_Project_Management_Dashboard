<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTPM Dashboard | Teams</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="state.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item" data-tooltip="Dashboard">
                    <i class="ph ph-squares-four"></i>
                </a>
                <a href="projects.html" class="nav-item" data-tooltip="Projects">
                    <i class="ph ph-kanban"></i>
                </a>

                <a href="teams.html" class="nav-item active" data-tooltip="Team">
                    <i class="ph ph-users"></i>
                </a>
                <a href="settings.html" class="nav-item" data-tooltip="Settings">
                    <i class="ph ph-gear"></i>
                </a>
            </nav>
            <div class="user-profile" onclick="openProfileModal()" style="cursor: pointer;">
                <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar">
            </div>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="dashboard-content">
            <header class="topbar">
                <div class="greeting">
                    <h1 class="animate-fade-in-up">Directory</h1>
                    <p class="subtitle animate-fade-in-up" style="animation-delay: 0.1s;">Manage teams and invite members</p>
                </div>
                <div class="topbar-actions animate-fade-in-up" style="animation-delay: 0.2s;">
                    <button class="btn-secondary" onclick="openModal('add-member-modal')">
                        <i class="ph ph-user-plus"></i>
                        Add Member
                    </button>
                    <button class="btn-primary" onclick="openModal('create-team-modal')">
                        <i class="ph ph-users-three"></i>
                        Create Team
                    </button>
                </div>
            </header>

            <section class="teams-section animate-fade-in-up" style="animation-delay: 0.3s; margin-bottom: 48px;">
                <div class="section-header">
                    <h2>Active Teams</h2>
                </div>
                <!-- This will be dynamically populated by teams.js -->
                <div class="grid-layout" id="teams-grid">
                </div>
            </section>
        </main>
    </div>

    <!-- Side Panel Team Details -->
    <div class="side-panel-overlay" id="team-side-panel">
        <div class="side-panel-content">
            <div class="side-panel-header">
                <div class="panel-team-title">
                    <div class="team-icon" id="panel-icon-container">
                        <i class="ph ph-users" id="panel-team-icon"></i>
                    </div>
                    <h2 id="panel-team-name">Team Name</h2>
                </div>
                <button class="modal-close" onclick="closeTeamPanel()" style="position: static;"><i class="ph ph-x"></i></button>
            </div>
            
            <div class="side-panel-body">
                <h3>Team Members</h3>
                <div id="panel-members-list" class="members-list">
                    <!-- Javascript populates this -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Create Team Modal -->
    <div class="modal-overlay" id="create-team-modal">
        <div class="modal-content card">
            <button class="modal-close" onclick="closeModal('create-team-modal')"><i class="ph ph-x"></i></button>
            <h2 style="margin-bottom: 24px;">Create New Team</h2>
            <form id="form-create-team">
                <div class="form-group">
                    <label>Team Name</label>
                    <input type="text" id="ct-name" class="form-control" placeholder="e.g. Platform Engineering" required>
                </div>
                <div class="form-group">
                    <label>Team Avatar/Icon ID</label>
                    <input type="text" id="ct-icon" class="form-control" placeholder="e.g. ph-rocket" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="ct-desc" class="form-control" rows="3" placeholder="What is this team responsible for?" required></textarea>
                </div>
                <div class="form-actions" style="margin-top: 32px; border: none; padding: 0;">
                    <button type="button" class="btn-secondary" onclick="closeModal('create-team-modal')">Cancel</button>
                    <button type="submit" class="btn-primary">Create Team</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="add-member-modal">
        <div class="modal-content card">
            <button class="modal-close" onclick="closeModal('add-member-modal')"><i class="ph ph-x"></i></button>
            <h2 style="margin-bottom: 24px;">Add New Member</h2>
            <form id="form-add-member">
                <div class="form-row" style="margin-bottom: 24px;">
                    <div class="form-group half" style="margin: 0;">
                        <label>First Name</label>
                        <input type="text" id="am-first" class="form-control" placeholder="Jane" required>
                    </div>
                    <div class="form-group half" style="margin: 0;">
                        <label>Last Name</label>
                        <input type="text" id="am-last" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="am-email" class="form-control" placeholder="jane@prospace.com" required>
                </div>
                <div class="form-group">
                    <label>Assign to Team</label>
                    <select id="am-team" class="form-control team-select-dropdown" required style="appearance: none;">
                        <option value="">Select a team...</option>
                        <!-- Updated dynamically via JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="am-role" class="form-control" required style="appearance: none;">
                        <option value="member">Member</option>
                        <option value="admin">Administrator</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>
                <div class="form-actions" style="margin-top: 32px; border: none; padding: 0;">
                    <button type="button" class="btn-secondary" onclick="closeModal('add-member-modal')">Cancel</button>
                    <button type="submit" class="btn-primary">Send Invite</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="teams.js"></script>
    <script>
        // General Modal Logic
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('active');
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.add('active');
            }, 10);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.querySelector('.modal-content').classList.remove('active');
            setTimeout(() => {
                modal.classList.remove('active');
            }, 300);
        }
    </script>
</body>
</html>
