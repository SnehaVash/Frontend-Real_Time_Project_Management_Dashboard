<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTPM Dashboard | Projects</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Using Phosphor Icons for sleek outlines -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="state.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item" data-tooltip="Dashboard">
                    <i class="ph ph-squares-four"></i>
                </a>
                <a href="projects.html" class="nav-item active" data-tooltip="Projects">
                    <i class="ph ph-kanban"></i>
                </a>

                <a href="teams.html" class="nav-item" data-tooltip="Team">
                    <i class="ph ph-users"></i>
                </a>
                <a href="settings.html" class="nav-item" data-tooltip="Settings">
                    <i class="ph ph-gear"></i>
                </a>
            </nav>
            <div class="user-profile" onclick="openProfileModal()" style="cursor: pointer;">
                <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar">
            </div>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="dashboard-content">
            <header class="topbar">
                <div class="greeting">
                    <h1 class="animate-fade-in-up">Active Projects</h1>
                    <p class="subtitle animate-fade-in-up" style="animation-delay: 0.1s;">Manage workflows and team assignments</p>
                </div>
                <div class="topbar-actions animate-fade-in-up" style="animation-delay: 0.2s;">
                    <a href="new-project.html" class="btn-primary" style="text-decoration: none;">
                        <i class="ph ph-plus"></i>
                        New Project
                    </a>
                </div>
            </header>

            <section class="projects-section animate-fade-in-up" style="animation-delay: 0.3s;">
                <div class="grid-layout" id="active-projects-grid">
                    <!-- Javascript populates this -->
                </div>
            </section>
        </main>
    </div>

    <!-- Search Overlay -->
    <div class="search-overlay" id="search-overlay">
        <div class="search-container">
            <i class="ph ph-magnifying-glass search-icon-large"></i>
            <input type="text" id="search-input" placeholder="Search projects, teams, members..." autocomplete="off">
            <button class="search-close" onclick="closeSearch()"><i class="ph ph-x"></i></button>
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <!-- Project Side Panel Details -->
    <div class="side-panel-overlay" id="project-side-panel">
        <div class="side-panel-content">
            <div class="side-panel-header">
                <div class="panel-team-title">
                    <div class="team-icon">
                        <i class="ph ph-kanban"></i>
                    </div>
                    <h2 id="pp-name">Project Name</h2>
                </div>
                <button class="modal-close" onclick="closeProjectPanel()" style="position: static;"><i class="ph ph-x"></i></button>
            </div>
            
            <div class="side-panel-body">
                <h3>Project Details</h3>
                
                <div style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-bottom: 24px;">
                    <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">Assigned Team</div>
                    <div id="pp-team" style="font-weight: 500;">Engineering</div>
                </div>

                <div style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="font-size: 12px; color: var(--text-secondary);">Completion</span>
                        <span id="pp-progress-text" style="font-size: 12px; font-weight: 600;">85%</span>
                    </div>
                    <div class="progress-bar-wrap" style="height: 8px; background: rgba(0,0,0,0.5);">
                        <div id="pp-progress-bar" class="progress-bar gradient-blue" style="width: 85%"></div>
                    </div>
                </div>

                <div style="display: flex; gap: 16px; margin-bottom: 32px;">
                    <div style="flex: 1; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;">
                        <div style="font-size: 11px; color: var(--text-secondary);">Start Date</div>
                        <div id="pp-start" style="font-size: 13px; margin-top: 4px;">Oct 1, 2024</div>
                    </div>
                    <div style="flex: 1; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;">
                        <div style="font-size: 11px; color: var(--text-secondary);">Target Launch</div>
                        <div id="pp-end" style="font-size: 13px; margin-top: 4px;">Dec 1, 2024</div>
                    </div>
                </div>

                <div style="margin-top: auto;">
                    <button class="btn-primary" id="pp-delete-btn" style="width: 100%; background: rgba(255, 69, 58, 0.1); color: var(--accent-danger); border: 1px solid rgba(255, 69, 58, 0.2); justify-content: center;">
                        <i class="ph ph-trash"></i> Delete Project
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="projects.js"></script>
</body>
</html>
