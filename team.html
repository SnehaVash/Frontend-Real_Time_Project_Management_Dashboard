<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team</title>
<link rel="stylesheet" href="Realdashboard.css">
</head>

<body>

<script>
// ✅ AUTH CHECK
if (!sessionStorage.getItem("token")) {
  window.location.href = "login.html";
}
</script>

<div class="shell">

<aside class="sidebar">
<div class="logo"><div class="logo-dot"></div>RTPM</div>

<div class="nav-label">Workspace</div>
<a href="RealDash.html" class="nav-item">Overview</a>
<a href="projects.html" class="nav-item">Projects</a>
<a href="sprint.html" class="nav-item">Sprint Board</a>
<a href="timeline.html" class="nav-item">Timeline</a>

<div class="nav-label">Manage</div>
<a href="team.html" class="nav-item active">Team</a>
<a href="reports.html" class="nav-item">Reports</a>

<div class="nav-label">Tools</div>
<a href="docs.html" class="nav-item">Docs</a>
<a href="settings.html" class="nav-item">Settings</a>
</aside>

<main class="main">

<div class="team-header">
<h1>Team Members</h1>
<button class="add-member" onclick="openMemberModal()">+ Add Member</button>
</div>

<div class="team-grid" id="teamGrid"></div>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="memberModal">
<div class="modal-content">

<h2>Add Team Member</h2>

<input type="text" id="memberName" placeholder="Member Name">
<input type="text" id="memberRole" placeholder="Role">

<div class="modal-buttons">
<button onclick="addMember()">Add Member</button>
<button onclick="closeMemberModal()">Cancel</button>
</div>

</div>
</div>

<script src="api.js"></script>

<script>
// MODAL
function openMemberModal() {
  document.getElementById("memberModal").style.display = "flex";
}

function closeMemberModal() {
  document.getElementById("memberModal").style.display = "none";
}

// LOAD USERS
async function loadTeam() {
  try {
    const res = await apiRequest("/api/users"); // adjust if needed
    const users = res.data || res;

    const container = document.getElementById("teamGrid");
    container.innerHTML = "";

    users.forEach(u => {
      const initials = (u.name || "U")
        .split(" ")
        .map(n => n[0])
        .join("")
        .toUpperCase();

      const card = `
      <div class="team-card">

      <button class="delete-member" onclick="deleteMember('${u._id}')">🗑</button>

      <div class="avatar">${initials}</div>
      <h3>${u.name}</h3>
      <p>${u.role || "Member"}</p>
      <span class="status online">Active</span>

      </div>
      `;

      container.insertAdjacentHTML("beforeend", card);
    });

  } catch (err) {
    console.error("Failed to load team:", err);
  }
}

// ADD MEMBER (optional backend support needed)
async function addMember() {
  const name = document.getElementById("memberName").value.trim();
  const role = document.getElementById("memberRole").value.trim();

  if (!name || !role) return;

  const res = await apiRequest("/api/users", "POST", {
    name,
    role
  });

  if (res._id) {
    closeMemberModal();
    loadTeam();
  }
}

// DELETE MEMBER
async function deleteMember(id) {
  if (!confirm("Delete member?")) return;

  await apiRequest(`/api/users/${id}`, "DELETE");
  loadTeam();
}

// INIT
document.addEventListener("DOMContentLoaded", loadTeam);
</script>

</body>
</html>
