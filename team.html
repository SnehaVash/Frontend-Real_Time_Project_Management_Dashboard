<!-- MODAL -->
<div class="modal" id="memberModal">
<div class="modal-content">

<h2>Add Team Member</h2>

<input type="text" id="memberName" placeholder="Member Name">
<input type="text" id="memberRole" placeholder="Role">

<select id="memberStatus">
<option value="online">Online</option>
<option value="offline">Offline</option>
<option value="busy">Busy</option>
</select>

<div class="modal-buttons">
<button onclick="addMember()">Add Member</button>
<button onclick="closeMemberModal()">Cancel</button>
</div>

</div>
</div>

<script>
function openMemberModal() {
document.getElementById("memberModal").style.display = "flex";
}

function closeMemberModal() {
document.getElementById("memberModal").style.display = "none";
}

function addMember() {

const name = document.getElementById("memberName").value.trim();
const role = document.getElementById("memberRole").value.trim();
const status = document.getElementById("memberStatus").value;

if (!name || !role) return;

const initials = name.split(" ").map(n => n[0]).join("").toUpperCase();

const card = `
<div class="team-card">

<button class="delete-member" onclick="deleteMember(this)">
<svg viewBox="0 0 24 24" width="14" height="14" fill="none">
<path d="M3 6h18" stroke="currentColor" stroke-width="2"/>
<path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2"/>
<path d="M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2"/>
<path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2"/>
</svg>
</button>

<div class="avatar">${initials}</div>
<h3>${name}</h3>
<p>${role}</p>
<span class="status ${status}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>

</div>
`;

document.getElementById("teamGrid").insertAdjacentHTML("beforeend", card);

closeMemberModal();

document.getElementById("memberName").value = "";
document.getElementById("memberRole").value = "";
}

function deleteMember(btn) {
btn.closest(".team-card").remove();
}
</script>
