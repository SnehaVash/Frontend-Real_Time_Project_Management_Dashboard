<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team</title>
    <link rel="stylesheet" href="Realdashboard.css">
</head>

<body>

    <div class="shell">

        <aside class="sidebar">

            <div class="logo">
                <div class="logo-dot"></div>
                RTPM
            </div>

            <div class="nav-label">Workspace</div>

            <a href="index.html" class="nav-item">
                <span class="nav-icon">◇</span> Overview
            </a>

            <a href="projects.html" class="nav-item">
                <span class="nav-icon">◈</span> Projects
            </a>

            <a href="sprint.html" class="nav-item">
                <span class="nav-icon">▣</span> Sprint Board
            </a>

            <a href="timeline.html" class="nav-item">
                <span class="nav-icon">◷</span> Timeline
            </a>

            <div class="nav-label">Manage</div>

            <a href="team.html" class="nav-item active">
                <span class="nav-icon">◎</span> Team
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">◌</span> Reports
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">◍</span> Goals
            </a>

        </aside>


        <main class="main">

            <div class="team-header">
                <h1>Team Members</h1>
                <button class="add-member" onclick="openMemberModal()">+ Add Member</button>
            </div>

            <div class="team-grid" id="teamGrid">

                <div class="team-card">

                    <button class="delete-member" onclick="deleteMember(this)">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                            <path d="M3 6h18" stroke="currentColor" stroke-width="2" />
                            <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" />
                            <path d="M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2" />
                            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>

                    <div class="avatar">PR</div>
                    <h3>Priya Sharma</h3>
                    <p>Frontend Developer</p>
                    <span class="status online">Online</span>

                </div>

                <div class="team-card">

                    <button class="delete-member" onclick="deleteMember(this)">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                            <path d="M3 6h18" stroke="currentColor" stroke-width="2" />
                            <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" />
                            <path d="M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2" />
                            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>

                    <div class="avatar">PR</div>
                    <h3>Rohan Kumar</h3>
                    <p>Backend Developer</p>
                    <span class="status online">Offline</span>

                </div>

                <div class="team-card">

                    <button class="delete-member" onclick="deleteMember(this)">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                            <path d="M3 6h18" stroke="currentColor" stroke-width="2" />
                            <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" />
                            <path d="M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2" />
                            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>

                    <div class="avatar">PR</div>
                    <h3>Meera Verma</h3>
                    <p>UI/UX</p>
                    <span class="status online">Online</span>

                </div>

            </div>

        </main>

    </div>


    <!-- ADD MEMBER MODAL -->
    <div class="modal" id="memberModal">
        <div class="modal-content">

            <h2>Add Team Member</h2>

            <input type="text" id="memberName" placeholder="Member Name">
            <input type="text" id="memberRole" placeholder="Role">

            <select id="memberStatus">
                <option value="online">Online</option>
                <option value="offline">Offline</option>
                <option value="busy">Busy</option>
            </select>

            <div class="modal-buttons">
                <button onclick="addMember()">Add Member</button>
                <button onclick="closeMemberModal()">Cancel</button>
            </div>

        </div>
    </div>


    <script>
        function openMemberModal() {
            document.getElementById("memberModal").style.display = "flex";
        }

        function closeMemberModal() {
            document.getElementById("memberModal").style.display = "none";
        }

        function addMember() {

            const name = document.getElementById("memberName").value;
            const role = document.getElementById("memberRole").value;
            const status = document.getElementById("memberStatus").value;

            if (!name || !role) return;

            const initials = name.split(" ").map(n => n[0]).join("").toUpperCase();

            const card = `
<div class="team-card">

<button class="delete-member" onclick="deleteMember(this)">
<svg viewBox="0 0 24 24" width="14" height="14" fill="none">
<path d="M3 6h18" stroke="currentColor" stroke-width="2"/>
<path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2"/>
<path d="M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2"/>
<path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2"/>
</svg>
</button>

<div class="avatar">${initials}</div>
<h3>${name}</h3>
<p>${role}</p>
<span class="status ${status}">
${status.charAt(0).toUpperCase() + status.slice(1)}
</span>

</div>
`;

            document.getElementById("teamGrid").insertAdjacentHTML("beforeend", card);

            closeMemberModal();

            document.getElementById("memberName").value = "";
            document.getElementById("memberRole").value = "";
        }
        function deleteMember(btn) {
            btn.parentElement.remove();
        }
    </script>

</body>

</html>
