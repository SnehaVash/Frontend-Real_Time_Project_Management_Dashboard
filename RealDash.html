<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTPM - Project Dashboard</title>

<link rel="stylesheet" href="Realdashboard.css">
</head>

<body>

<script>
// ✅ SAFE AUTH CHECK
if (!sessionStorage.getItem("token")) {
  window.location.href = "login.html";
}
</script>

<div class="shell">

<aside class="sidebar">
<div class="logo"><div class="logo-dot"></div>RTPM</div>

<div class="nav-label">Workspace</div>
<a href="RealDash.html" class="nav-item active">Overview</a>
<a href="projects.html" class="nav-item">Projects</a>
<a href="sprint.html" class="nav-item">Sprint Board</a>
<a href="timeline.html" class="nav-item">Timeline</a>

<div class="nav-label">Manage</div>
<a href="team.html" class="nav-item">Team</a>
<a href="reports.html" class="nav-item">Reports</a>
<a href="goals.html" class="nav-item">Goals</a>

<div class="nav-label">Tools</div>
<a href="docs.html" class="nav-item">Docs</a>
<a href="settings.html" class="nav-item">Settings</a>

<div class="sidebar-bottom">
<div class="user-card">
<div class="avatar" id="userAvatar">U</div>
<div class="user-info">
<div class="user-name" id="userName">User</div>
<div class="user-role" id="userRole">Member</div>
</div>
</div>
</div>
</aside>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Dashboard</div>
<div class="breadcrumb">Live Project Insights</div>
</div>

<div class="topbar-actions">
<a href="filter.html" class="btn btn-ghost">⚙ Filter</a>
<a href="projects.html" class="btn btn-primary">+ Create Project</a>
<a href="newtask.html" class="btn btn-primary">+ New Task</a>
</div>
</header>

<div class="content">

<div class="stats-row">
<div class="stat-card c1">
<div class="stat-value" id="s1">0</div>
<div class="stat-label">Active Tasks</div>
</div>

<div class="stat-card c2">
<div class="stat-value" id="s2">0</div>
<div class="stat-label">Projects</div>
</div>

<div class="stat-card c3">
<div class="stat-value" id="s3">0%</div>
<div class="stat-label">Completion</div>
</div>

<div class="stat-card c4">
<div class="stat-value" id="s4">0</div>
<div class="stat-label">Team Members</div>
</div>
</div>

</div>
</div>
</div>

<script src="api.js"></script>

<script>
// USER INFO
document.addEventListener("DOMContentLoaded", () => {
  const user = JSON.parse(sessionStorage.getItem("user") || "{}");

  document.getElementById("userName").textContent = user.name || "User";
  document.getElementById("userRole").textContent = user.role || "Member";
  document.getElementById("userAvatar").textContent =
    (user.name || "U")[0].toUpperCase();

  loadDashboard();
});

// DASHBOARD DATA
async function loadDashboard() {
  try {
    const tasks = await apiRequest("/api/tasks");
    const projects = await apiRequest("/api/projects");

    const taskList = tasks.data || tasks;
    const projectList = projects.data || projects;

    document.getElementById("s1").textContent = taskList.length;
    document.getElementById("s2").textContent = projectList.length;

    const completed = taskList.filter(t => t.status === "done").length;
    const percent = taskList.length ? Math.round((completed / taskList.length) * 100) : 0;

    document.getElementById("s3").textContent = percent + "%";
    document.getElementById("s4").textContent = "—"; // optional if no team API

  } catch (err) {
    console.error("Dashboard load error:", err);
  }
}
</script>

</body>
</html>
