  sessionStorage.removeItem("user");

<header class="topbar">
<div>

<div class="breadcrumb">Track project progress</div>
</div>
</header>

<div class="content">

<div id="goalsContainer" class="goals-wrapper">
<p>Loading goals...</p>
</div>

</div>
</div>

</div>

<script src="api.js"></script>

<script>
async function loadGoals() {
  const container = document.getElementById("goalsContainer");

  try {
    const res = await apiRequest("/goals", "GET");

    if (!res || !res.data || res.data.length === 0) {
      container.innerHTML = "<p>No goals found</p>";
      return;
    }

    container.innerHTML = res.data.map(project => `
      <div class="project-goals">
        <h2 class="project-title">${project.name || "Untitled Project"}</h2>

        <div class="goals-grid">
          ${(project.goals || []).map(goal => {
            const progress = Math.min(100, goal.progress || 0);

            return `
              <div class="goal-card">
                <h3>${goal.title || "No Title"}</h3>

                <div class="progress-bar">
                  <div class="progress" style="width:${progress}%"></div>
                </div>

                <span>${progress}%</span>
              </div>
            `;
          }).join("")}
        </div>
      </div>
    `).join("");

  } catch (err) {
    console.error("Error loading goals:", err);
    container.innerHTML = "<p>Failed to load goals</p>";
  }
}

document.addEventListener("DOMContentLoaded", loadGoals);
</script>

</body>
</html>
