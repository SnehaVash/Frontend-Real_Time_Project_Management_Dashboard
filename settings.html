<body>

<script>

  window.location.href = "login.html";
}
</script>

<div class="shell">

<aside class="sidebar">
<div class="logo"><div class="logo-dot"></div>RTPM</div>

<div class="nav-label">Workspace</div>
<a href="RealDash.html" class="nav-item">Overview</a>
<a href="projects.html" class="nav-item">Projects</a>

</aside>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Settings</div>
<div class="breadcrumb">Manage your preferences</div>
</div>
</header>

<div class="content">

<div class="profile-card">
<div class="profile-left">
<div class="profile-avatar" id="avatar">U</div>
<div>
<h3 class="profile-name" id="name">User</h3>
<div id="role" style="font-size:12px;color:#aaa">Member</div>
</div>
</div>

<button onclick="openModal()">Edit Profile</button>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="profileModal" style="display:none">
<div class="modal-content">
<h2>Edit Profile</h2>

<input id="profileName">
<input id="profileRole">

<div>
<button onclick="saveProfile()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>
</div>

<script src="api.js"></script>

<script>
// LOAD USER
document.addEventListener("DOMContentLoaded", () => {
  const user = JSON.parse(sessionStorage.getItem("user") || "{}");

  document.getElementById("name").textContent = user.name || "User";
  document.getElementById("role").textContent = user.role || "Member";
  document.getElementById("avatar").textContent =
    (user.name || "U")[0].toUpperCase();
});

// MODAL
function openModal() {
  document.getElementById("profileModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("profileModal").style.display = "none";
}

// SAVE PROFILE (OPTIONAL BACKEND SYNC)
async function saveProfile() {
  const name = document.getElementById("profileName").value;
  const role = document.getElementById("profileRole").value;

  try {
    const res = await apiRequest("/api/users/update", "PUT", {
      name,
      role
    });

    if (res?.success === false) {
      alert("Update failed");
      return;
    }

    // update session
    const user = JSON.parse(sessionStorage.getItem("user") || "{}");
    user.name = name;
    user.role = role;
    sessionStorage.setItem("user", JSON.stringify(user));

    location.reload();

  } catch (err) {
    alert("Server error");
  }
}
</script>

</body>
</html>
