<html lang="en">

</head>

<body>

<script>

if (!sessionStorage.getItem("token")) {
  window.location.href = "login.html";
}
</script>

<div class="shell">

<aside class="sidebar">
<div class="logo"><div class="logo-dot"></div>RTPM</div>

<div class="nav-label">Workspace</div>
<a href="RealDash.html" class="nav-item">Overview</a>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Sprint Board</div>
<div class="breadcrumb">Live Tasks</div>
</div>
</header>

<div class="content">

<div class="sprint-board">

<div class="sprint-col">
<div class="sprint-col-title">TO DO</div>
<div id="todo"></div>
</div>

<div class="sprint-col">
<div class="sprint-col-title">IN PROGRESS</div>
<div id="inprogress"></div>
</div>

<div class="sprint-col">
<div class="sprint-col-title">DONE</div>
<div id="done"></div>
</div>

</div>

</div>
</div>
</div>

<script src="api.js"></script>

<script>
async function loadTasks() {
  try {
    const res = await apiRequest("/api/tasks");
    const tasks = res.data || res;

    const todo = document.getElementById("todo");
    const inprogress = document.getElementById("inprogress");
    const done = document.getElementById("done");

    todo.innerHTML = "";
    inprogress.innerHTML = "";
    done.innerHTML = "";

    tasks.forEach(t => {
      const card = document.createElement("div");
      card.className = "task-card";
      card.innerHTML = `<div class="task-title">${t.title}</div>`;

      if (t.status === "todo" || t.status === "pending") {
        todo.appendChild(card);
      } else if (t.status === "in-progress") {
        inprogress.appendChild(card);
      } else if (t.status === "done" || t.status === "completed") {
        done.appendChild(card);
      }
    });

  } catch (err) {
    console.error("Sprint load error:", err);
  }
}

document.addEventListener("DOMContentLoaded", loadTasks);
</script>

</body>
</html>
