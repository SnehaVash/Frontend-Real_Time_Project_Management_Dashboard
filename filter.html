<body>

<script>

if (sessionStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}
</script>

<div class="shell">

<!-- Sidebar -->
<aside class="sidebar">
<div class="logo">
<div class="logo-dot"></div>
RTPM
</div>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Advanced Filters</div>
<div class="breadcrumb">Filter tasks & projects</div>
</div>
</header>

<div class="content">

<div class="filter-grid">

<!-- Status -->
<div class="filter-card">
<div class="filter-title">Status</div>

<label class="check">
<input type="checkbox" value="todo"> To Do
</label>

<label class="check">
<input type="checkbox" value="in-progress"> In Progress
</label>

<label class="check">
<input type="checkbox" value="done"> Done
</label>

</div>

<!-- Priority -->
<div class="filter-card">
<div class="filter-title">Priority</div>

<label class="check">
<input type="checkbox" value="high"> High
</label>

<label class="check">
<input type="checkbox" value="medium"> Medium
</label>

<label class="check">
<input type="checkbox" value="low"> Low
</label>

</div>

<!-- Team -->
<div class="filter-card">
<div class="filter-title">Team Member</div>

<select class="input" id="teamFilter">
<option value="all">All Members</option>
</select>

</div>

<!-- Date -->
<div class="filter-card">
<div class="filter-title">Due Date</div>

<input type="date" class="input" id="fromDate">
<br><br>
<input type="date" class="input" id="toDate">

</div>

</div>

<div style="margin-top:20px">
<button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
<button class="btn btn-ghost" onclick="resetFilters()">Reset</button>
</div>

</div>
</div>

</div>

<script>

function getCheckedValues(name) {
  const values = [];
  document.querySelectorAll(`input[type="checkbox"]`).forEach(cb => {
    if (cb.checked) values.push(cb.value);
  });
  return values;
}


function applyFilters() {
  const status = [];
  const priority = [];

  document.querySelectorAll(".filter-card:nth-child(1) input:checked")
    .forEach(cb => status.push(cb.value));

  document.querySelectorAll(".filter-card:nth-child(2) input:checked")
    .forEach(cb => priority.push(cb.value));

  const team = document.getElementById("teamFilter").value;
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const filters = {
    status,
    priority,
    team,
    from,
    to
  };

  console.log("Applied Filters:", filters);

  alert("Filters applied (frontend ready). Backend integration next step.");
}


function resetFilters() {
  document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
  document.getElementById("teamFilter").value = "all";
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
}


document.addEventListener("DOMContentLoaded", () => {
  const user = JSON.parse(sessionStorage.getItem("user"));

  // later we can use this to populate team dynamically
  console.log("Logged in user:", user);
});
</script>

</body>
</html>
