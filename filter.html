<body>

<script>
// AUTH CHECK (aligned with api.js)
const token = sessionStorage.getItem("token");

if (!token) {
  sessionStorage.removeItem("auth");
  sessionStorage.removeItem("user");
  window.location.href = "login.html";
}
</script>

<div class="shell">

<!-- Sidebar -->
<aside class="sidebar">
<div class="logo">
<div class="logo-dot"></div>
RTPM
</div>

<div class="nav-label">Workspace</div>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Advanced Filters</div>
<div class="breadcrumb">Filter tasks & projects</div>
</div>
</header>

<div class="content">

<div class="filter-grid">

<!-- Status -->
<div class="filter-card" id="statusFilter">
<div class="filter-title">Status</div>

<label class="check"><input type="checkbox" value="todo"> To Do</label>
<label class="check"><input type="checkbox" value="in-progress"> In Progress</label>
<label class="check"><input type="checkbox" value="done"> Done</label>

</div>

<!-- Priority -->
<div class="filter-card" id="priorityFilter">
<div class="filter-title">Priority</div>

<label class="check"><input type="checkbox" value="high"> High</label>
<label class="check"><input type="checkbox" value="medium"> Medium</label>
<label class="check"><input type="checkbox" value="low"> Low</label>

</div>

<!-- Team -->
<div class="filter-card">
<div class="filter-title">Team Member</div>

<select class="input" id="teamFilter">
<option value="all">All Members</option>
</select>

</div>

<!-- Date -->
<div class="filter-card">
<div class="filter-title">Due Date</div>

<input type="date" class="input" id="fromDate">
<br><br>
<input type="date" class="input" id="toDate">

</div>

</div>

<div style="margin-top:20px">
<button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
<button class="btn btn-ghost" onclick="resetFilters()">Reset</button>
</div>

</div>
</div>

</div>

<!-- API FIRST (safe load order fix) -->
<script src="api.js"></script>

<script>
function getCheckedValues(containerId) {
  const values = [];
  document.querySelectorAll(`#${containerId} input:checked`).forEach(cb => {
    values.push(cb.value);
  });
  return values;
}

async function applyFilters() {
  const status = getCheckedValues("statusFilter");
  const priority = getCheckedValues("priorityFilter");

  const team = document.getElementById("teamFilter").value;
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const filters = {
    status,
    priority,
    team,
    from,
    to
  };

  console.log("Sending filters to backend:", filters);

  try {
    const res = await apiRequest("/tasks/filter", "POST", filters);

    console.log("Filtered results:", res);

    alert("Filters applied successfully!");

    // TODO: render results in UI

  } catch (err) {
    console.error("Filter error:", err);
  }
}

function resetFilters() {
  document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
  document.getElementById("teamFilter").value = "all";
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
}

document.addEventListener("DOMContentLoaded", () => {
  const user = JSON.parse(sessionStorage.getItem("user"));
  console.log("Logged in user:", user);
});
</script>

</body>
</html>
