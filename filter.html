<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Filter</title>
<link rel="stylesheet" href="Realdashboard.css">
</head>

<body>

<div class="shell">

<!-- Sidebar -->
<aside class="sidebar">
<div class="logo">
<div class="logo-dot"></div>
RTPM
</div>

<div class="nav-label">Workspace</div>
<a href="index.html" class="nav-item">Overview</a>
<a href="projects.html" class="nav-item">Projects</a>
<a href="sprint.html" class="nav-item">Sprint Board</a>
<a href="timeline.html" class="nav-item">Timeline</a>
</aside>

<div class="main">

<header class="topbar">
<div>
<div class="page-title">Advanced Filters</div>
<div class="breadcrumb">Filter tasks & projects</div>
</div>
</header>

<div class="content">

<div class="filter-grid">

<!-- Status -->
<div class="filter-card">
<div class="filter-title">Status</div>

<label class="check">
<input type="checkbox"> To Do
</label>

<label class="check">
<input type="checkbox"> In Progress
</label>

<label class="check">
<input type="checkbox"> Done
</label>

</div>

<!-- Priority -->
<div class="filter-card">
<div class="filter-title">Priority</div>

<label class="check">
<input type="checkbox"> High
</label>

<label class="check">
<input type="checkbox"> Medium
</label>

<label class="check">
<input type="checkbox"> Low
</label>

</div>

<!-- Team -->
<div class="filter-card">
<div class="filter-title">Team Member</div>

<select class="input">
<option>All Members</option>
<option>Aryan</option>
<option>Priya</option>
<option>Rohan</option>
<option>Zara</option>
</select>

</div>

<!-- Date -->
<div class="filter-card">
<div class="filter-title">Due Date</div>

<input type="date" class="input">
<br><br>
<input type="date" class="input">

</div>

</div>

<div style="margin-top:20px">
<button class="btn btn-primary">Apply Filters</button>
<button class="btn btn-ghost">Reset</button>
</div>

</div>
</div>

</div>

</body>
</html>
