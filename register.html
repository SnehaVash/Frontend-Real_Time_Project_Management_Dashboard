<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #020617, #0f172a);
        }

        .card {
            width: 380px;
            padding: 40px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
            color: white;
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .inputBox {
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            outline: none;
        }

        select option {
            background: #1e293b;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            margin-top: 10px;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loginLink {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
        }

        .loginLink span {
            color: #8b5cf6;
            cursor: pointer;
        }

        .errorMsg {
            color: #f87171;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .successMsg {
            color: #4ade80;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="title">Create Account</div>

        <div class="inputBox">
            <input id="newName" placeholder="Full Name">
        </div>

        <div class="inputBox">
            <input id="newEmail" type="email" placeholder="Email">
        </div>

        <div class="inputBox">
            <input id="newPass" type="password" placeholder="Password">
        </div>

        <div class="inputBox">
            <input id="confirmPass" type="password" placeholder="Confirm Password">
            <div class="errorMsg" id="passError">Passwords do not match</div>
        </div>

        <div class="inputBox">
            <select id="role">
                <option value="" disabled selected>Select Role</option>
                <option value="manager">Manager</option>
                <option value="employee">Employee</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="errorMsg" id="apiError"></div>
        <div class="successMsg" id="successMsg">Account created successfully! Redirecting...</div>

        <button class="btn" id="registerBtn" onclick="register()">Register</button>

        <div class="loginLink">
            Already have account?
            <span onclick="goLogin()">Login</span>
        </div>

    </div>

    <script>
        async function register() {
            const name     = document.getElementById("newName").value.trim();
            const email    = document.getElementById("newEmail").value.trim();
            const pass     = document.getElementById("newPass").value;
            const confirm  = document.getElementById("confirmPass").value;
            const role     = document.getElementById("role").value;

            const passError = document.getElementById("passError");
            const apiError  = document.getElementById("apiError");
            const successMsg = document.getElementById("successMsg");
            const btn       = document.getElementById("registerBtn");

            // Reset messages
            passError.style.display  = "none";
            apiError.style.display   = "none";
            successMsg.style.display = "none";

            // Basic validation
            if (!name || !email || !pass || !role) {
                apiError.textContent = "Please fill in all fields.";
                apiError.style.display = "block";
                return;
            }

            if (pass !== confirm) {
                passError.style.display = "block";
                return;
            }

            // Disable button & show loading
            btn.disabled = true;
            btn.textContent = "Registering...";

            try {
                const response = await fetch("https://rtpm-dashboard.onrender.com/api/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name, email, password: pass, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Show error returned from API (e.g. "Email already exists")
                    apiError.textContent = data.message || "Registration failed. Please try again.";
                    apiError.style.display = "block";
                    return;
                }

                // Success
                successMsg.style.display = "block";
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);

            } catch (err) {
                apiError.textContent = "Cannot connect to server. Please try again.";
                apiError.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Register";
            }
        }

        function goLogin() {
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
