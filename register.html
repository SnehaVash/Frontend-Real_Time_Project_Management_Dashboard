<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* SAME CSS (unchanged) */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a);
}

.card {
width:380px;
padding:40px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,.5);
color:white;
}

.title { font-size:24px; margin-bottom:20px; }

.inputBox { margin-bottom:15px; }

input, select {
width:100%;
padding:14px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

select option { background:#1e293b; color:white; }

.btn {
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
cursor:pointer;
margin-top:10px;
}

.btn:disabled { opacity:0.6; }

.loginLink {
text-align:center;
margin-top:15px;
font-size:13px;
color:#aaa;
}

.loginLink span { color:#8b5cf6; cursor:pointer; }

.errorMsg {
color:#f87171;
font-size:12px;
margin-top:6px;
display:none;
}

.successMsg {
color:#4ade80;
font-size:13px;
text-align:center;
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<script>
// ✅ FIXED AUTH CHECK
if (sessionStorage.getItem("token")) {
  window.location.href = "RealDash.html";
}
</script>

<div class="card">

<div class="title">Create Account</div>

<div class="inputBox">
<input id="newName" placeholder="Full Name">
</div>

<div class="inputBox">
<input id="newEmail" type="email" placeholder="Email">
</div>

<div class="inputBox">
<input id="newPass" type="password" placeholder="Password">
</div>

<div class="inputBox">
<input id="confirmPass" type="password" placeholder="Confirm Password">
<div class="errorMsg" id="passError">Passwords do not match</div>
</div>

<div class="inputBox">
<select id="role">
<option value="" disabled selected>Select Role</option>
<option value="manager">Manager</option>
<option value="employee">Employee</option>
<option value="admin">Admin</option>
</select>
</div>

<div class="errorMsg" id="apiError"></div>
<div class="successMsg" id="successMsg">Account created successfully!</div>

<button class="btn" id="registerBtn" onclick="register()">Register</button>

<div class="loginLink">
Already have account?
<span onclick="goLogin()">Login</span>
</div>

</div>

<script src="api.js"></script>

<script>
async function register() {
  const name = document.getElementById("newName").value.trim();
  const email = document.getElementById("newEmail").value.trim();
  const pass = document.getElementById("newPass").value;
  const confirm = document.getElementById("confirmPass").value;
  const role = document.getElementById("role").value;

  const passError = document.getElementById("passError");
  const apiError = document.getElementById("apiError");
  const successMsg = document.getElementById("successMsg");
  const btn = document.getElementById("registerBtn");

  passError.style.display = "none";
  apiError.style.display = "none";
  successMsg.style.display = "none";

  if (!name || !email || !pass || !role) {
    apiError.textContent = "Please fill in all fields.";
    apiError.style.display = "block";
    return;
  }

  if (pass !== confirm) {
    passError.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Registering...";

  try {
    const res = await apiRequest("/api/auth/register", "POST", {
      name,
      email,
      password: pass,
      role
    });

    if (!res || res.success === false) {
      apiError.textContent = res?.message || "Registration failed.";
      apiError.style.display = "block";
      return;
    }

    successMsg.style.display = "block";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1200);

  } catch (err) {
    apiError.textContent = "Server not reachable.";
    apiError.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Register";
  }
}

function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
